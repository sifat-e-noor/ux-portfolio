<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fallback: redirect missing files to index route.
      // pathSegmentsToKeep=1 keeps '/ux-portfolio' for project pages.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      var repoBase = l.pathname
        .split('/')
        .slice(0, 1 + pathSegmentsToKeep)
        .join('/');
      var routePath = l.pathname
        .slice(1)
        .split('/')
        .slice(pathSegmentsToKeep)
        .join('/');

      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          repoBase +
          '/?/' +
          routePath.replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
